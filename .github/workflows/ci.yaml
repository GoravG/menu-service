name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: tmp/bin/main
          generate_release_notes: true
