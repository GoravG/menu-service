info:
  name: Create Tag
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/tags"
  body:
    type: json
    data: |-
      {
        "name": "popular",
        "description": "popular foods"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
